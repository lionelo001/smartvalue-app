<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartValue — Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#F2F4F7;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .card{background:#fff;border-radius:16px;padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
  .logo{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:#1E2330;margin-bottom:1.5rem;}
  .logo span{color:#2563EB;}
  .icon{font-size:3rem;margin-bottom:1.5rem;}
  h1{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#1E2330;margin-bottom:0.75rem;}
  p{font-size:0.9rem;color:#6B7080;line-height:1.7;margin-bottom:1.5rem;}
  .badge{display:inline-flex;align-items:center;gap:6px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:20px;padding:0.4rem 1rem;font-size:0.75rem;color:#2563EB;font-weight:600;}
  .dot{width:7px;height:7px;border-radius:50%;background:#2563EB;animation:pulse 1.5s ease infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Smart<span>Value</span></div>
  <div class="icon">🔧</div>
  <h1>Maintenance en cours</h1>
  <p>Nous effectuons des améliorations pour vous offrir une meilleure expérience. Le scanner sera de retour très prochainement !</p>
  <div class="badge"><div class="dot"></div>Retour imminent</div>
</div>
</body>
</html>
